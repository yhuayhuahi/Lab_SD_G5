syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.lab.grpc.converter";
option java_outer_classname = "ConverterProto";

service Converter {
  rpc Convert (ConvertRequest) returns (ConvertResponse);
  rpc GetCatalog (CatalogRequest) returns (CatalogResponse);
}

message ConvertRequest {
  string type = 1;
  double value = 2;
  string category = 3;
  string from_unit = 4;
  string to_unit = 5;
}

message ConvertResponse {
  double result = 1;
  string description = 2;
  bool success = 3;
  string errorMessage = 4;
  string category = 5;
  string from_unit = 6;
  string to_unit = 7;
}

message CatalogRequest {
}

message UnitInfo {
  string code = 1;
  string label = 2;
}

message CategoryInfo {
  string code = 1;
  string label = 2;
  string default_from_unit = 3;
  string default_to_unit = 4;
  repeated UnitInfo units = 5;
}

message CatalogResponse {
  repeated CategoryInfo categories = 1;
}