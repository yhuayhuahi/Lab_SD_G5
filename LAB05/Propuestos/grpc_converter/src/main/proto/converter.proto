syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.mycompany.converter";
option java_outer_classname = "ConverterProto";

service Converter {
  rpc Convert (ConvertRequest) returns (ConvertResponse);
}

message ConvertRequest {                          // mensaje que envia cliente a servidor
  string type = 1;                                // de conversion que se hara
  double value = 2;                               // 
}

message ConvertResponse {                        // respuesta del servidor
  double result = 1;                             // 
  string description = 2;                        // explicacion del resultado
  bool success = 3;                              // si salio bien o no la conversion
  string errorMessage = 4;                       // mensaje de error
}