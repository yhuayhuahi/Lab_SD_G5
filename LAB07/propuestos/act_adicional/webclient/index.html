<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Proyecto Web</title>
    
  <link rel="stylesheet" href="css/style.css">
   
</head>
<body>

  <header>
    <h1>Calculadora de números enteros</h1>
  </header>

  <div id="container">
    <div class="numbers_cont">
      <label class="lbl">Primer número</label>
      <input class="number" id="inp-a" type="number" step="1"/>
      <label class="lbl">Segundo número</label>
      <input class="number" id="inp-b" type="number" step="1"/>
    </div>
    <div class="operations_cont">
      <button class="btn" id="btn-add">Sumar</button>
      <button class="btn" id="btn-sub">Restar</button>
      <button class="btn" id="btn-mul">Multiplicar</button>
      <button class="btn" id="btn-div">Dividir</button>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Calculadora :3</p>
  </footer>
  <script type="module" src="js/main.js" defer></script>
</body>
</html>
