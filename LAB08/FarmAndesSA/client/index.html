<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inventario Distribuido | Transferencias entre Almacenes</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>Sistema de Inventario Distribuido</h1>
            <p>Transferencia de productos entre almacenes con Two-Phase Commit (2PC)</p>
        </header>

        <!-- Selector de servidor -->
        <div class="server-selector">
            <label>Conectado a:</label>
            <div class="server-buttons">
                <button class="server-btn" data-server="arequipa" data-port="3001">
                    Arequipa
                </button>
                <button class="server-btn" data-server="lima" data-port="3002">
                    Lima
                </button>
                <button class="server-btn" data-server="cusco" data-port="3003">
                    Cusco
                </button>
            </div>
            <div class="server-status" id="serverStatus">
                <span class="status-dot"></span>
                <span id="statusText">Selecciona un servidor</span>
            </div>
        </div>

        <!-- Contenido principal -->
        <div class="main-content">
            <!-- Panel izquierdo: Inventario -->
            <div class="panel inventory-panel">
                <div class="panel-header">
                    <h2>Inventario Local</h2>
                    <button id="refreshInventory" class="btn-refresh">⟳ Actualizar</button>
                </div>
                <div class="inventory-table-container">
                    <table class="inventory-table" id="inventoryTable">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Stock</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryBody">
                            <tr>
                                <td colspan="3" class="loading">Selecciona un servidor para ver el inventario</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Panel derecho: Transferencia -->
            <div class="panel transfer-panel">
                <div class="panel-header">
                    <h2>Transferir Producto</h2>
                </div>
                
                <div class="form-group">
                    <label for="productoSelect">Producto:</label>
                    <select id="productoSelect">
                        <option value="">Selecciona un producto</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="cantidad">Cantidad:</label>
                    <input type="number" id="cantidad" min="1" value="1" step="1">
                </div>

                <div class="form-group">
                    <label for="destinoSelect">Almacén destino:</label>
                    <select id="destinoSelect">
                        <option value="">Selecciona destino</option>
                        <option value="arequipa">Arequipa</option>
                        <option value="lima">Lima</option>
                        <option value="cusco">Cusco</option>
                    </select>
                </div>

                <button id="transferBtn" class="btn-transfer">Transferir</button>

                <!-- Resultado de transferencia -->
                <div id="transferResult" class="transfer-result"></div>
            </div>
        </div>

        <!-- Panel de logs -->
        <div class="logs-panel">
            <div class="panel-header">
                <h2>Log de Transacciones</h2>
                <button id="clearLogs" class="btn-clear">Limpiar</button>
            </div>
            <div class="logs-container" id="logsContainer">
                <div class="log-entry info">Selecciona un servidor para comenzar</div>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
